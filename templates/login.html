{% extends "base.html" %}
{% block title %}Đăng Nhập Giáo Viên{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <h1 class="login-title">Đăng Nhập</h1>
    <p class="login-subtitle">Dành cho Giáo viên và Quản trị viên</p>
    <form method="POST" action="{{ url_for('login') }}" class="login-form">
      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Đăng nhập →</button>
    </form>
    <p class="login-hint">Tài khoản mặc định: <strong>admin / admin123</strong></p>
    <div class="login-footer">
      <a href="{{ url_for('index') }}">← Quay lại trang nộp hồ sơ</a>
    </div>
  </div>
</div>
{% endblock %}
